spring:
  application:
    name: smart-campus-hub-api
  
  data:
    mongodb:
      uri: mongodb://localhost:27017/smart_campus_db
      # Alternative configuration (if not using URI):
      # host: localhost
      # port: 27017
      # database: smart_campus_db
      # username: root (if authentication is enabled)
      # password: root
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your_google_client_id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your_google_client_secret}
            redirect-uri: http://localhost:8080/login/oauth2/code/google
            scope: profile,email
        provider:
          google:
            user-name-attribute: sub

server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    root: INFO
    com.smartcampus: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

app:
  jwt:
    secret: ${JWT_SECRET:smart-campus-hub-secret-key-2026-please-change-in-production}
    expiration: 86400000
  file:
    upload-dir: uploads/
